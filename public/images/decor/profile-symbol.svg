<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified Globe with Mesh/Grid for Climate Modelling & HPC -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2" />
  
  <!-- Longitudes -->
  <ellipse cx="50" cy="50" rx="15" ry="45" fill="none" stroke="currentColor" stroke-width="1.5" />
  <ellipse cx="50" cy="50" rx="30" ry="45" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2" />
  
  <!-- Latitudes -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="currentColor" stroke-width="1.5" />
  <line x1="10" y1="30" x2="90" y2="30" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2" />
  <line x1="10" y1="70" x2="90" y2="70" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2" />
  
  <!-- HPC/Grid nodes -->
  <circle cx="50" cy="50" r="3" fill="currentColor" />
  <circle cx="50" cy="20" r="2" fill="currentColor" />
  <circle cx="50" cy="80" r="2" fill="currentColor" />
  <circle cx="20" cy="50" r="2" fill="currentColor" />
  <circle cx="80" cy="50" r="2" fill="currentColor" />
  
  <!-- Connection lines (Modelling) -->
  <path d="M 50 20 L 80 50 L 50 80 L 20 50 Z" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6" />
</svg>
