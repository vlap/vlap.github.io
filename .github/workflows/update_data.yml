name: Update Research Data

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch ORCID Data
        run: python3 scripts/fetch_orcid.py
        continue-on-error: true

      - name: Fetch Google Scholar Stats
        run: python3 scripts/fetch_scholar.py
        continue-on-error: true

      - name: Fetch GitHub Activity
        run: python3 scripts/fetch_github.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        continue-on-error: true

      - name: Update Consolidated Stats
        run: python3 scripts/update_stats.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.yaml content/posts/*.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated update of research data [$(date +'%Y-%m-%d')]"
            git push
          fi
